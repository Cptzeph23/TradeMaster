# ============================================================
# ABSOLUTE PATH: /etc/nginx/sites-available/forex_bot
# HTTP-only config for local development (no SSL needed)
# Replace with production SSL config when you have a domain
# ============================================================

upstream forex_daphne {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost 127.0.0.1;

    # ── Static files ──────────────────────────────────────────
    location /static/ {
        alias /home/cptzeph/Desktop/Programs/python/forex_bot/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/cptzeph/Desktop/Programs/python/forex_bot/media/;
    }

    # ── WebSocket connections ─────────────────────────────────
    location /ws/ {
        proxy_pass          http://forex_daphne;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── API and all other requests ────────────────────────────
    location / {
        proxy_pass          http://forex_daphne;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_buffering     off;
    }

    client_max_body_size 10M;
    keepalive_timeout 65;

    # Basic gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}