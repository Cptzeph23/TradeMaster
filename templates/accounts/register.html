<!-- ============================================================
     Registration page
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ForexBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <style>
    body { justify-content: center; align-items: center; background: var(--bg-primary); }
    .auth-wrap {
      width: 100%; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .brand-icon {
      font-size: 32px; display: block; margin-bottom: 8px;
      color: var(--accent);
      filter: drop-shadow(0 0 10px var(--accent));
    }
    .auth-logo h1 {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-error {
      background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3);
      color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .auth-success {
      background: var(--green-dim); border: 1px solid rgba(16,185,129,0.3);
      color: var(--green); padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-icon">⬡</span>
      <h1>Create Account</h1>
    </div>

    <div class="auth-error"   id="regError"></div>
    <div class="auth-success" id="regSuccess"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="name-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" id="firstName" class="form-input"
                 placeholder="John" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" id="lastName" class="form-input"
                 placeholder="Doe" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input"
               placeholder="trader@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input"
               placeholder="Min. 8 characters" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="passwordConfirm" class="form-input"
               placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;padding:11px"
              id="registerBtn">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/accounts/login/">Sign in</a>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
async function handleRegister(e) {
  e.preventDefault();

  const btn   = document.getElementById('registerBtn');
  const error = document.getElementById('regError');
  const succ  = document.getElementById('regSuccess');

  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('passwordConfirm').value;

  error.style.display = 'none';
  succ.style.display  = 'none';

  if (password !== confirm) {
    error.textContent   = 'Passwords do not match.';
    error.style.display = 'block';
    return;
  }
  if (password.length < 8) {
    error.textContent   = 'Password must be at least 8 characters.';
    error.style.display = 'block';
    return;
  }

  btn.innerHTML = '<span class="spinner"></span>Creating account…';
  btn.disabled  = true;

  try {
    const res = await API.post('/auth/register/', {
      email:            document.getElementById('email').value.trim(),
      first_name:       document.getElementById('firstName').value.trim(),
      last_name:        document.getElementById('lastName').value.trim(),
      password:         password,
      password_confirm: confirm,
    });

    if (res && res.success) {
      // Store tokens and redirect to dashboard
      API.setToken(res.tokens.access);
      localStorage.setItem('refresh_token', res.tokens.refresh);
      succ.textContent   = 'Account created! Redirecting to dashboard…';
      succ.style.display = 'block';
      setTimeout(() => { window.location.href = '/dashboard/'; }, 1200);
    } else {
      // Show validation errors
      const errors = res?.errors || {};
      const msgs   = Object.entries(errors)
        .map(([k, v]) => `${k}: ${Array.isArray(v) ? v[0] : v}`)
        .join('\n');
      error.textContent   = msgs || res?.message || 'Registration failed.';
      error.style.display = 'block';
    }
  } catch(e) {
    error.textContent   = e.message || 'Registration failed.';
    error.style.display = 'block';
  } finally {
    btn.innerHTML = 'Create Account';
    btn.disabled  = false;
  }
}
</script>
</body>
</html>
