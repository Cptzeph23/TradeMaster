<!-- ============================================================
     Master layout template — all pages extend this
     ============================================================ -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

  <!-- PWA Manifest -->
<link rel="manifest" href="/static/manifest.json"/>
 
<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ForexBot"/>
<link rel="apple-touch-icon" href="/static/images/icons/icon-192.png"/>
 
<!-- Theme colour (browser tab + Android chrome) -->
<meta name="theme-color" content="#3b82f6"/>
 
<!-- Mobile viewport -->
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="ForexBot"/>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ForexBot{% endblock %} — ForexBot Platform</title>
  <meta name="description" content="Automated Forex Trading Platform"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Main CSS -->
  <link rel="stylesheet" href="/static/css/main.css"/>

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">⬡</span>
    <span class="brand-text">ForexBot</span>
  </div>

  <nav class="sidebar-nav">
    <a href="/dashboard/" class="nav-item {% block nav_dashboard %}{% endblock %}">
      <span class="nav-icon">◈</span><span>Dashboard</span>
    </a>
    <a href="/bots/" class="nav-item {% block nav_bots %}{% endblock %}">
      <span class="nav-icon">◎</span><span>Bots</span>
    </a>
    <a href="/strategies/" class="nav-item {% block nav_strategies %}{% endblock %}">
      <span class="nav-icon">◇</span><span>Strategies</span>
    </a>
    <a href="/backtesting/" class="nav-item {% block nav_backtest %}{% endblock %}">
      <span class="nav-icon">◁</span><span>Backtest</span>
    </a>
    <a href="/market-data/" class="nav-item {% block nav_market %}{% endblock %}">
      <span class="nav-icon">◉</span><span>Market Data</span>
    </a>
    <a href="/accounts/" class="nav-link {% if request.path == '/accounts/' %}active{% endif %}">
      <span class="nav-icon">⚡</span> Accounts
    </a>
    <a href="/risk/" class="nav-item {% block nav_risk %}{% endblock %}">
      <span class="nav-icon">△</span><span>Risk</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="connection-status" id="wsStatus">
      <span class="status-dot"></span>
      <span class="status-text">Connecting…</span>
    </div>
    <a href="/accounts/logout/" class="nav-item logout-btn">
      <span class="nav-icon">⊗</span><span>Logout</span>
    </a>
  </div>
</aside>

<!-- ── Main content ──────────────────────────────────────────── -->
<main class="main-content">
  <header class="top-bar">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="top-bar-title">{% block page_title %}{% endblock %}</div>
    <div class="top-bar-actions">
      <!-- NLP Command Bar -->
      <div class="command-bar" id="commandBar">
        <input type="text" id="nlpInput"
               placeholder="Tell your bot what to do…"
               autocomplete="off"/>
        <button onclick="sendNLPCommand()" class="btn-send">↵</button>
      </div>
      <div class="user-badge" id="userBadge">—</div>
    </div>
  </header>

  <!-- Notification toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Page content -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>
</main>

<!-- ── Main JS ────────────────────────────────────────────────── -->
<script src="/static/js/api.js"></script>
<script src="/static/js/websocket.js"></script>
<script src="/static/js/main.js"></script>
{% block extra_scripts %}{% endblock %}

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker
      .register('/static/js/sw.js', { scope: '/' })
      .then(reg => {
        console.log('[SW] Registered:', reg.scope);
        // Update last online time for offline page
        localStorage.setItem('forexbot_last_online', Date.now().toString());
      })
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
}
 
// Show install prompt on mobile
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show "Add to Home Screen" button if present
  const installBtn = document.getElementById('installPWA');
  if (installBtn) installBtn.style.display = 'flex';
});
 
function installPWA() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') {
      console.log('[PWA] Installed to home screen');
    }
    deferredInstallPrompt = null;
    const btn = document.getElementById('installPWA');
    if (btn) btn.style.display = 'none';
  });
}
</script>
 

</body>
</html>
